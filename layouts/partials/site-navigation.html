<nav class="site-nav" role="navigation" aria-label="Main navigation">
  <div class="nav-inner">
    <a href="{{ .Site.Home.RelPermalink }}" class="nav-brand" aria-label="{{ .Site.Title }} home">
      <img src="/fire.gif" alt="" aria-hidden="true" style="height:26px;width:auto;background:transparent;">
      <span><span class="nav-brand-fire">Wild</span>fire Lab</span>
    </a>

    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav-menu" aria-label="Toggle navigation">
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
    </button>

    <div class="nav-menu" id="primary-nav-menu">
      {{ if .Site.Menus.main }}
      <ul class="nav-links">
        {{ range .Site.Menus.main }}
        <li{{ if .HasChildren }} class="has-children"{{ end }}>
          <a href="{{ if eq .URL "/" }}{{ $.Site.Home.RelPermalink }}{{ else }}{{ .URL | relURL }}{{ end }}">{{ .Name }}</a>
          {{ if .HasChildren }}
          <ul class="submenu">
            {{ range .Children }}
            <li><a href="{{ .URL | relURL }}">{{ .Name }}</a></li>
            {{ end }}
          </ul>
          {{ end }}
        </li>
        {{ end }}
      </ul>
      {{ end }}
    </div>
  </div>
</nav>

<script>
(function () {
  var nav = document.querySelector('.site-nav');
  if (!nav) return;
  var toggle = nav.querySelector('.nav-toggle');
  var menu = nav.querySelector('#primary-nav-menu');
  if (!toggle || !menu) return;

  toggle.addEventListener('click', function () {
    var isOpen = nav.classList.toggle('is-open');
    toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  });

  menu.addEventListener('click', function (e) {
    var link = e.target.closest('a');
    if (!link) return;
    var parentLi = link.closest('li');
    if (parentLi && parentLi.classList.contains('has-children') && link === parentLi.querySelector(':scope > a')) return;
    if (window.innerWidth <= 840) {
      nav.classList.remove('is-open');
      toggle.setAttribute('aria-expanded', 'false');
    }
  });

  window.addEventListener('scroll', function () {
    nav.classList.toggle('scrolled', window.scrollY > 20);
  }, { passive: true });
})();
</script>
